services:
  postgres:
    image: postgres:15-alpine
    container_name: one-hour-hero-db
    environment:
      POSTGRES_DB: one_hour_hero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: one-hour-hero-backend
    environment:
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=one_hour_hero port=5432 sslmode=disable"
      JWT_SECRET: "your-secret-key-change-in-production"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: one-hour-hero-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
