linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 3
  gosec:
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)
  revive:
    rules:
      - name: exported
        disabled: false
      - name: var-naming
        disabled: false

linters:
  disable-all: true
  enable:
    # Core linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    
    # Code quality
    - gofmt
    - goimports
    - misspell
    - goconst
    - gocyclo
    - dupl
    - revive
    
    # Security
    - gosec
    
    # Additional
    - unconvert
    - unparam
    - exportloopref

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
  skip-files:
    - ".*_test\\.go$"  # Skip test files for some checks

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - gosec

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
